name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

jobs:
  pipeline:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Unit tests + coverage
        run: npm run test:unit -- --coverage

      - name: Check coverage thresholds
        run: npm run test:unit -- --coverage --reporter=verbose

      - name: Build (assets/vérification)
        run: npm run build --if-present

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: E2E tests
        run: npm run test:e2e
        env:
          NODE_ENV: test
          SESSION_SECRET: ci-secret-not-for-prod
          DATABASE_URL: ":memory:"

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage
          path: coverage/

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: playwright-report/
  deploy:
    runs-on: ubuntu-latest
    needs: pipeline

    steps:
      - name: Deploy on VPS
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          script: |
            if [ ! -d /var/www/Vroom-vroom-cliker/.git ]; then
              git clone https://github.com/Legluc/Vroom-vroom-cliker.git /var/www/Vroom-vroom-cliker
            fi
            cd /var/www/Vroom-vroom-cliker
            git fetch origin main
            git reset --hard origin/main
            npm install --omit=dev
            mkdir -p data
            npx pm2 reload Vroom-vroom-cliker || npx pm2 start npm --name Vroom-vroom-cliker -- start
            npx pm2 save
